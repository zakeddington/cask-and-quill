<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Catalog | Cask & Quill</title>
	<link rel="icon" type="image/png" href="/assets/images/favicon/favicon-96x96.png" sizes="96x96" />
	<link rel="icon" type="image/svg+xml" href="/assets/images/favicon/favicon.svg" />
	<link rel="shortcut icon" href="/assets/images/favicon/favicon.ico" />
	<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
	<link rel="manifest" href="/assets/images/favicon/site.webmanifest" />
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="/assets/styles/styles.css">
</head>
<body>
	<header class="header">
		<nav class="nav">
			<a class="nav-logo" href="/">
				<img class="nav-logo-img" src="/assets/images/logo.png" alt="Cask & Quill Logo">
			</a>
			<div class="nav-buttons">
				<a id="regions-btn" class="button button-tertiary" href="/">Regions</a>
				<a id="lexicon-btn" class="button button-tertiary" href="/lexicon/">Lexicon</a>
				<a id="catalog-btn" class="button button-tertiary active" href="/catalog/">Catalog</a>
			</div>
			<div id="catalog-auth-root" class="catalog-auth-root"></div>
			<button id="catalog-add-btn" class="button-primary nav-catalog-add-btn" hidden>
				<svg class="svg-icon" aria-hidden="true" focusable="false"><use href="/assets/images/icon-sprite.svg#icon-plus"></use></svg>
				<span>Add Bottle</span>
			</button>
			<button id="nav-menu-btn" class="nav-menu-btn" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="nav-drawer">
				<svg class="svg-icon" aria-hidden="true" focusable="false"><use href="/assets/images/icon-sprite.svg#icon-list"></use></svg>
			</button>
		</nav>
	</header>

	<div id="nav-drawer-overlay" class="nav-drawer-overlay"></div>
	<nav id="nav-drawer" class="nav-drawer" aria-label="Site navigation" aria-hidden="true">
		<div class="nav-drawer-header">
			<button class="nav-drawer-close" type="button" aria-label="Close menu">
				<svg class="svg-icon" aria-hidden="true" focusable="false"><use href="/assets/images/icon-sprite.svg#icon-x"></use></svg>
			</button>
		</div>
		<div class="nav-drawer-links">
			<a class="button button-tertiary" href="/">Regions</a>
			<a class="button button-tertiary" href="/lexicon/">Lexicon</a>
			<a class="button button-tertiary active" href="/catalog/">Catalog</a>
		</div>
	</nav>

	<main class="main-content">
		<div class="catalog-container">
			<section class="hero grid">
				<div class="hero-heading grid-col-md-12 grid-col-lg-7">
					<h1 class="hero-title">Catalog</h1>
					<p>A working ledger of bottles, production notes, mash bills, and tasting impressions from the private collection.</p>
				</div>
				<div class="hero-image-col grid-col-md-12 grid-col-lg-5">
					<img class="hero-image" src="/assets/images/hero-catalog.jpg" alt="illustration of bottles" />
				</div>
			</section>

			<section class="catalog-heading">
				<div class="catalog-controls-row">
					<div class="catalog-search-container">
						<input type="search" id="catalog-search" placeholder="Search bottles..." class="catalog-search-input" aria-label="Search bottles">
					</div>
					<div class="catalog-filter-controls">
						<select id="catalog-category" class="catalog-filter-select" aria-label="Filter by category">
							<option value="">Category</option>
						</select>
						<select id="catalog-filter" class="catalog-filter-select" aria-label="Filter by fill level">
							<option value="">Fill Level</option>
						</select>
						<select id="catalog-sort" class="catalog-filter-select" aria-label="Sort bottles">
							<option value="">Sort</option>
							<option value="abv-asc">ABV: Low to High</option>
							<option value="abv-desc">ABV: High to Low</option>
							<option value="age-asc">Age: Youngest First</option>
							<option value="age-desc">Age: Oldest First</option>
						</select>
					</div>
				</div>
				<div class="catalog-controls-row">
					<p id="catalog-count" class="catalog-count text-heading-md">0 bottles</p>
				</div>
			</section>

			<p class="catalog-legend text-body-sm">(Values) represent estimates when official information is not disclosed.</p>

			<div id="catalog-list" class="catalog-list">
				<!-- Bottles will be populated by JavaScript -->
			</div>
		</div>
	</main>

	<div id="catalog-modal-root" class="catalog-modal-root" aria-live="polite"></div>

	<script type="module" src="/assets/scripts/scripts.js"></script>
</body>
</html>
